name: Playwright SWIFT MT103 Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - uses: actions/checkout@v4

      # 2. Install Node.js LTS
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install npm dependencies (reads package.json)
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers + OS dependencies
      #    Much simpler than Selenium's manual Chrome install —
      #    Playwright bundles its own browser installer
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 5. Run all tests (headless by default in CI)
      - name: Run Playwright SWIFT Tests
        run: npx playwright test

      # 6. Upload HTML report (even on failure — same as Selenium pipeline)
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
